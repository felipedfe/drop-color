<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Phaser Template</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;

    html, body {

<body>
  <div id="game-container"></div>
  <script type="module" src="/src/main.js"></script>

</html>
